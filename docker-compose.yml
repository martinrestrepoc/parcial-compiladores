services:
  postgres:
    image: postgres:16
    container_name: parcial_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: springboot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    #Verifica si postgres está corriendo antes de iniciar la api
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d springboot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parcial_compiladores_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8050:8050"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/springboot_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      LANGCHAIN4J_OPEN_AI_CHAT_MODEL_API_KEY: ${OPENAI_API_KEY:-demo}
      LANGCHAIN4J_OPEN_AI_CHAT_MODEL_MODEL_NAME: gpt-4o-mini
      JAVA_OPTS: -Xms256m -Xmx512m
      # Para limitar el uso de memoria de Java

volumes:
  postgres_data:
